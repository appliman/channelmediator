trigger:
  branches:
    include:
      - prod
  paths:
    include:
      - ChannelMediator/**
      - ChannelMediator.Contracts/**
      - ChannelMediator.Tests/**

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  dotnetVersion: '10.x'

stages:
  - stage: Build
    displayName: 'Build and Test'
    jobs:
      - job: BuildAndTest
        displayName: 'Build and Run Tests'
        steps:
          - task: UseDotNet@2
            displayName: 'Install .NET 10'
            inputs:
              packageType: 'sdk'
              version: '10.x'

          - task: UseDotNet@2
            displayName: 'Install .NET 9'
            inputs:
              packageType: 'sdk'
              version: '9.x'

          - task: NuGetAuthenticate@1
            displayName: 'Authenticate to Azure Artifacts'

          - task: DotNetCoreCLI@2
            displayName: 'Restore packages'
            inputs:
              command: 'restore'
              projects: '**/*.csproj'

          - task: DotNetCoreCLI@2
            displayName: 'Build solution'
            inputs:
              command: 'build'
              projects: '**/*.csproj'
              arguments: '--configuration $(buildConfiguration) --no-restore'

          - task: DotNetCoreCLI@2
            displayName: 'Run tests with code coverage'
            inputs:
              command: 'test'
              projects: '**/*Tests.csproj'
              arguments: '--configuration $(buildConfiguration) --verbosity normal --collect:"XPlat Code Coverage"'

          - task: PublishCodeCoverageResults@2
            displayName: 'Publish code coverage results'
            inputs:
              summaryFileLocation: '$(Agent.TempDirectory)/**/coverage.cobertura.xml'

  - stage: Pack
    displayName: 'Pack and Publish NuGet Packages'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - job: PackNuGet
        displayName: 'Create NuGet Packages'
        steps:
          - task: UseDotNet@2
            displayName: 'Install .NET 10'
            inputs:
              packageType: 'sdk'
              version: '10.x'

          - task: UseDotNet@2
            displayName: 'Install .NET 9'
            inputs:
              packageType: 'sdk'
              version: '9.x'

          - task: NuGetAuthenticate@1
            displayName: 'Authenticate to Azure Artifacts'

          - task: DotNetCoreCLI@2
            displayName: 'Restore packages'
            inputs:
              command: 'restore'
              projects: '**/*.csproj'

          - task: DotNetCoreCLI@2
            displayName: 'Pack ChannelMediator.Contracts'
            inputs:
              command: 'pack'
              packagesToPack: 'src/ChannelMediator.Contracts/ChannelMediator.Contracts.csproj'
              configuration: '$(buildConfiguration)'
              outputDir: '$(Build.ArtifactStagingDirectory)/nuget'

          - task: DotNetCoreCLI@2
            displayName: 'Pack ChannelMediator'
            inputs:
              command: 'pack'
              packagesToPack: 'src/ChannelMediator/ChannelMediator.csproj'
              configuration: '$(buildConfiguration)'
              outputDir: '$(Build.ArtifactStagingDirectory)/nuget'

          - task: DotNetCoreCLI@2
            displayName: 'Pack ChannelMediator.AzureBus'
            inputs:
              command: 'pack'
              packagesToPack: 'src/ChannelMediator.AzureBus/ChannelMediator.AzureBus.csproj'
              configuration: '$(buildConfiguration)'
              outputDir: '$(Build.ArtifactStagingDirectory)/nuget'

          - task: DotNetCoreCLI@2
            displayName: 'Pack ChannelMediator.MinimalApiGenerator.Abstraction'
            inputs:
              command: 'pack'
              packagesToPack: 'src/ChannelMediator.MinimalApiGenerator.Abstraction/ChannelMediator.MinimalApiGenerator.Abstraction.csproj'
              configuration: '$(buildConfiguration)'
              outputDir: '$(Build.ArtifactStagingDirectory)/nuget'

          - task: DotNetCoreCLI@2
            displayName: 'Pack ChannelMediator.MinimalApiGenerator'
            inputs:
              command: 'pack'
              packagesToPack: 'src/ChannelMediator.MinimalApiGenerator/ChannelMediator.MinimalApiGenerator.csproj'
              configuration: '$(buildConfiguration)'
              outputDir: '$(Build.ArtifactStagingDirectory)/nuget'

          - task: DotNetCoreCLI@2
            displayName: 'Pack ChannelMediator.ApiClientGenerator'
            inputs:
              command: 'pack'
              packagesToPack: 'src/ChannelMediator.ApiClientGenerator/ChannelMediator.ApiClientGenerator.csproj'
              configuration: '$(buildConfiguration)'
              outputDir: '$(Build.ArtifactStagingDirectory)/nuget'

          # - task: DotNetCoreCLI@2
          #   displayName: "NuGet push"
          #   inputs:
          #     command: 'push'
          #     packagesToPush: '$(Build.ArtifactStagingDirectory)/**/*.nupkg;!$(Build.ArtifactStagingDirectory)/**/*.symbols.nupkg'
          #     publishVstsFeed: 'appliman'
          #     allowPackageConflicts: true

          - bash: |
             set -euo pipefail

             FEED_URL="https://pkgs.dev.azure.com/appliman/_packaging/a8d351f6-ea82-7aa8-a7c0-020494ee512c/nuget/v3/index.json"

             # push tous les .nupkg (hors symbols)
             find "$(Build.ArtifactStagingDirectory)" -name "*.nupkg" ! -name "*.symbols.nupkg" -print0 \
                  | while IFS= read -r -d '' pkg; do
                      echo "Pushing: $pkg"
                      dotnet nuget push "$pkg" \
                        --source "$FEED_URL" \
                        --api-key VSTS \
                        --skip-duplicate
                    done
            displayName: "NuGet push (skip duplicates)"
