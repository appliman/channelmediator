name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
assignees:
  - appliman
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug!
        Please fill out the sections below so we can reproduce and fix the issue as quickly as possible.

  - type: checkboxes
    id: existing-issues
    attributes:
      label: Pre-flight Checklist
      options:
        - label: I have searched the existing issues and this bug has not been reported yet.
          required: true
        - label: I am using the latest version of the package.
          required: false

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
      placeholder: When I call X with Y, I expect Z but instead get W.
    validations:
      required: true

  - type: textarea
    id: repro-steps
    attributes:
      label: Steps to Reproduce
      description: Provide the minimal steps required to reproduce the issue.
      placeholder: |
        1. Create a channel with ...
        2. Subscribe to ...
        3. Publish a message ...
        4. Observe error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include any error messages or stack traces.
    validations:
      required: true

  - type: dropdown
    id: dotnet-version
    attributes:
      label: .NET Version
      description: Which .NET version are you targeting?
      options:
        - .NET 10
        - .NET 9
        - .NET 8
        - .NET 7 or older
        - Other
    validations:
      required: true

  - type: input
    id: package-version
    attributes:
      label: Package Version
      description: "Which version of ChannelMediator are you using? (e.g., 1.0.0)"
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Log Output
      description: If applicable, paste any relevant log output or stack traces.
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, or code snippets that may help.
