name: 💡 Feature Request
description: Suggest an idea or improvement for the project
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees:
  - appliman
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a new feature!
        Please describe your idea clearly so we can evaluate and discuss it with the community.

  - type: checkboxes
    id: existing-requests
    attributes:
      label: Pre-flight Checklist
      options:
        - label: I have searched existing issues and this feature has not been requested yet.
          required: true

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      description: What area of the project does this feature relate to?
      options:
        - API / Public Surface
        - Performance
        - Documentation
        - Tooling / Developer Experience
        - Testing
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: |
        Is your feature request related to a problem? Describe it clearly.
        Example: "I'm always frustrated when …"
      placeholder: I find it difficult to ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like. Be as specific as possible.
      placeholder: |
        I would like an API that allows ...

        ```csharp
        // Example usage
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or workarounds you've considered.
    validations:
      required: false

  - type: dropdown
    id: breaking-change
    attributes:
      label: Would this be a breaking change?
      options:
        - "No"
        - "Yes"
        - "I'm not sure"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context, mockups, or references that support the request.
